name: Anchor Test

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  CARGO_TERM_COLOR: always
  SOLANA_VERSION: 2.1.19
  ANCHOR_VERSION: 0.31.1

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        solana-version: ['2.1.19']
        anchor-version: ['0.31.1']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: sc-solana/yarn.lock

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Cache Solana CLI
        id: cache-solana
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana/install
          key: solana-${{ matrix.solana-version }}

      - name: Install Solana CLI
        if: steps.cache-solana.outputs.cache-hit != 'true'
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ matrix.solana-version }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Verify Solana installation
        run: solana --version

      - name: Cache Anchor CLI
        id: cache-anchor
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/anchor
          key: anchor-${{ matrix.anchor-version }}

      - name: Install Anchor CLI
        if: steps.cache-anchor.outputs.cache-hit != 'true'
        run: |
          cargo install --git https://github.com/coral-xyz/anchor anchor-cli --tag v${{ matrix.anchor-version }}
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Verify Anchor installation
        run: anchor --version

      - name: Setup Yarn in sc-solana
        working-directory: ./sc-solana
        run: yarn install --frozen-lockfile

      - name: Run Anchor tests
        working-directory: ./sc-solana
        run: anchor test --skip-local-validator
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Build program
        working-directory: ./sc-solana
        run: anchor build

      - name: Upload program artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: program-artifacts
          path: |
            sc-solana/target/deploy/*.so
            sc-solana/target/idl/*.json
          retention-days: 30
