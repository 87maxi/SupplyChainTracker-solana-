name: CI

# Concurrency: cancel stale runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  SOLANA_VERSION: 2.1.18
  ANCHOR_VERSION: 0.32.1
  NODE_VERSION: 20
  # Real program ID - matches declare_id!() in lib.rs and Anchor.toml
  NEXT_PUBLIC_PROGRAM_ID: "7bGrgLgTDyQY4SMmHpQpdT2VDur8iVCRGBBjSMrcCvrb"
  NEXT_PUBLIC_RPC_URL: "https://api.devnet.solana.com"
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  # ============================================================================
  # Job 1: Rust Formatting & Clippy
  # ============================================================================
  rust-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        # Reads rust-toolchain.toml automatically for version pinning

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: cargo-registry-${{ hashFiles('sc-solana/Cargo.lock') }}

      - name: Cache Cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/index
          key: cargo-index

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: sc-solana/target
          key: cargo-target-${{ hashFiles('sc-solana/Cargo.lock') }}

      - name: Rust Format Check
        run: cd sc-solana && cargo fmt --check

      - name: Rust Clippy (Warnings as Errors)
        run: cd sc-solana && cargo clippy -- -D warnings

  # ============================================================================
  # Job 2: Build Solana Program (cargo check only)
  # ============================================================================
  build-program:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        # Reads rust-toolchain.toml automatically for version pinning

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: cargo-registry-${{ hashFiles('sc-solana/Cargo.lock') }}

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: sc-solana/target
          key: cargo-target-${{ hashFiles('sc-solana/Cargo.lock') }}

      - name: Build Program (cargo check)
        run: cd sc-solana && cargo check --all-targets

  # ============================================================================
  # Job 2b: Mollusk Tests (In-process SVM testing - no validator needed)
  # ============================================================================
  test-mollusk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        # Reads rust-toolchain.toml automatically for version pinning

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: cargo-registry-${{ hashFiles('sc-solana/Cargo.lock') }}

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: sc-solana/target
          key: cargo-target-${{ hashFiles('sc-solana/Cargo.lock') }}

      - name: Run Mollusk Tests (no .so file required)
        run: cd sc-solana/programs/sc-solana && cargo test --test mollusk-tests

  # ============================================================================
  # Job 3: TypeScript Type Checking
  # ============================================================================
  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./web
        run: npm install --prefer-offline --no-audit --no-fund

      - name: TypeScript Type Check (web)
        working-directory: ./web
        run: npx tsc --noEmit

  # ============================================================================
  # Job 4: Frontend Linting
  # ============================================================================
  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./web
        run: npm install --prefer-offline --no-audit --no-fund

      - name: ESLint (Strict - Zero Warnings)
        working-directory: ./web
        run: npx eslint src/ --max-warnings=0

  # ============================================================================
  # Job 5: Unit Tests (Jest)
  # ============================================================================
  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./web
        run: npm install --prefer-offline --no-audit --no-fund

      - name: Run Jest Unit Tests
        working-directory: ./web
        run: npm test -- --forceExit --detectOpenHandles

  # ============================================================================
  # Job 6: Build Frontend
  # ============================================================================
  build-frontend:
    runs-on: ubuntu-latest
    needs: [type-check, frontend-lint, test-unit]
    env:
      NEXT_PUBLIC_DISABLE_PRERENDER: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./web
        run: npm install --prefer-offline --no-audit --no-fund

      - name: Build Next.js Frontend
        working-directory: ./web
        env:
          NODE_ENV: production
          NEXT_PUBLIC_CLUSTER: devnet
        run: npm run build

  # ============================================================================
  # Job 7: Playwright E2E Tests (UI-only, no blockchain)
  # NOTE: These are UI-only tests with mocked wallet. No Solana validator needed.
  # Integration tests requiring real blockchain are in the disabled test-integration job.
  # ============================================================================
  test-e2e:
    runs-on: ubuntu-latest
    needs: [type-check, frontend-lint, test-unit]
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_PROGRAM_ID: "7bGrgLgTDyQY4SMmHpQpdT2VDur8iVCRGBBjSMrcCvrb"
      NEXT_PUBLIC_RPC_URL: "http://localhost:8899"
      NEXT_PUBLIC_CLUSTER: "localnet"
      NEXT_PUBLIC_NETWORK: "localnet"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./web
        run: npm install --prefer-offline --no-audit --no-fund

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ hashFiles('web/package-lock.json') }}
          restore-keys: |
            playwright-browsers-

      - name: Install Playwright Browsers
        working-directory: ./web
        run: npx playwright install --with-deps chromium

      - name: Build Next.js for E2E (production server required)
        working-directory: ./web
        env:
          NODE_ENV: production
          NEXT_PUBLIC_RPC_URL: "http://localhost:8899"
          NEXT_PUBLIC_CLUSTER: "localnet"
          NEXT_PUBLIC_NETWORK: "localnet"
        run: npm run build

      # Playwright webServer config handles server lifecycle automatically.
      # In CI: uses 'npm start' (production server, requires build)
      # Locally: uses 'npm run dev' (development server with hot-reload)
      # No manual server startup needed - webServer starts, waits for health-check,
      # runs tests, and shuts down the server automatically.
      - name: Run Playwright E2E Tests (Chromium only)
        working-directory: ./web
        run: npx playwright test --reporter=html --project=chromium
        timeout-minutes: 10

      - name: Merge E2E Videos into Single Video
        if: always()
        run: |
          set -ex
          # Install ffmpeg
          sudo apt-get update && sudo apt-get install -y ffmpeg
          
          VIDEO_DIR="web/test-results"
          OUTPUT_VIDEO="e2e-full-recording.webm"
          
          # Find all video files
          VIDEOS=$(find "$VIDEO_DIR" -name "*.webm" -type f 2>/dev/null | sort)
          
          if [ -z "$VIDEOS" ]; then
            echo "No videos found to merge"
            exit 0
          fi
          
          # Create concat list for ffmpeg
          echo "$VIDEOS" | while read f; do
            echo "file '$(realpath "$f")'"
          done > /tmp/video_concat.txt
          
          # Merge all videos into one
          ffmpeg -f concat -safe 0 -i /tmp/video_concat.txt \
            -c copy \
            -y "$OUTPUT_VIDEO"
          
          echo "Merged video: $OUTPUT_VIDEO"
          ls -lh "$OUTPUT_VIDEO"

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 30

      - name: Upload E2E Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: web/test-results/
          retention-days: 30

      - name: Upload Unified E2E Video
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-unified-video
          path: e2e-full-recording.webm
          retention-days: 30

  # ============================================================================
  # Job 8: Integration E2E Tests (Real Solana Test Validator)
