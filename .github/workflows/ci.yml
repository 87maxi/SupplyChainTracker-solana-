name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  SOLANA_VERSION: 2.1.19
  ANCHOR_VERSION: 0.32.1
  NODE_VERSION: 20
  # Real program ID - matches declare_id!() in lib.rs and Anchor.toml
  NEXT_PUBLIC_PROGRAM_ID: "7bGrgLgTDyQY4SMmHpQpdT2VDur8iVCRGBBjSMrcCvrb"
  NEXT_PUBLIC_RPC_URL: "https://api.devnet.solana.com"
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  # ============================================================================
  # Job 1: Rust Formatting & Clippy
  # ============================================================================
  rust-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        # Reads rust-toolchain.toml automatically for version pinning

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: cargo-registry-${{ hashFiles('sc-solana/Cargo.lock') }}

      - name: Cache Cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/index
          key: cargo-index

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: sc-solana/target
          key: cargo-target-${{ hashFiles('sc-solana/Cargo.lock') }}

      - name: Rust Format Check
        run: cd sc-solana && cargo fmt --check

      - name: Rust Clippy (Warnings as Errors)
        run: cd sc-solana && cargo clippy -- -D warnings

  # ============================================================================
  # Job 2: Build Solana Program (cargo check only)
  # ============================================================================
  build-program:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        # Reads rust-toolchain.toml automatically for version pinning

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: cargo-registry-${{ hashFiles('sc-solana/Cargo.lock') }}

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: sc-solana/target
          key: cargo-target-${{ hashFiles('sc-solana/Cargo.lock') }}

      - name: Build Program (cargo check)
        run: cd sc-solana && cargo check --all-targets

  # ============================================================================
  # Job 2b: Mollusk Tests (In-process SVM testing - no validator needed)
  # ============================================================================
  test-mollusk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        # Reads rust-toolchain.toml automatically for version pinning

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: cargo-registry-${{ hashFiles('sc-solana/Cargo.lock') }}

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: sc-solana/target
          key: cargo-target-${{ hashFiles('sc-solana/Cargo.lock') }}

      - name: Run Mollusk Tests (no .so file required)
        run: cd sc-solana/programs/sc-solana && cargo test --test mollusk-tests

  # ============================================================================
  # Job 3: TypeScript Type Checking
  # ============================================================================
  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./web
        run: npm install --prefer-offline --no-audit --no-fund

      - name: TypeScript Type Check (web)
        working-directory: ./web
        run: npx tsc --noEmit

  # ============================================================================
  # Job 4: Frontend Linting
  # ============================================================================
  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./web
        run: npm install --prefer-offline --no-audit --no-fund

      - name: ESLint (Strict - Zero Warnings)
        working-directory: ./web
        run: npx eslint src/ --max-warnings=0

  # ============================================================================
  # Job 5: Unit Tests (Jest)
  # ============================================================================
  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./web
        run: npm install --prefer-offline --no-audit --no-fund

      - name: Run Jest Unit Tests
        working-directory: ./web
        run: npm test -- --forceExit --detectOpenHandles

  # ============================================================================
  # Job 6: Build Frontend
  # ============================================================================
  build-frontend:
    runs-on: ubuntu-latest
    needs: [type-check, frontend-lint, test-unit]
    env:
      NEXT_PUBLIC_DISABLE_PRERENDER: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./web
        run: npm install --prefer-offline --no-audit --no-fund

      - name: Build Next.js Frontend
        working-directory: ./web
        env:
          NODE_ENV: production
          NEXT_PUBLIC_CLUSTER: devnet
        run: npm run build

  # ============================================================================
  # Job 7: Playwright E2E Tests
  # ============================================================================
  test-e2e:
    runs-on: ubuntu-latest
    needs: [type-check, frontend-lint, test-unit]
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_PROGRAM_ID: "11111111111111111111111111111112"
      NEXT_PUBLIC_RPC_URL: "https://api.devnet.solana.com"
      NEXT_PUBLIC_CLUSTER: "devnet"
      NEXT_PUBLIC_NETWORK: "devnet"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./web
        run: npm install --prefer-offline

      - name: Install Playwright Browsers
        working-directory: ./web
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E Tests (Headless Mode)
        working-directory: ./web
        run: npx playwright test --reporter=html --project=chromium
        timeout-minutes: 15

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 30

      - name: Upload E2E Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: web/test-results/
          retention-days: 30

      - name: Upload E2E Videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-videos
          path: web/test-results/**/*.webm
          retention-days: 30

  # ============================================================================
  # Job 8: Integration E2E Tests (Real Solana Test Validator)
  # ============================================================================
  test-integration:
    runs-on: ubuntu-latest
    needs: [build-program, test-mollusk]
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_PROGRAM_ID: "7bGrgLgTDyQY4SMmHpQpdT2VDur8iVCRGBBjSMrcCvrb"
      NEXT_PUBLIC_RPC_URL: "http://localhost:8899"
      NEXT_PUBLIC_CLUSTER: "localnet"
      E2E_TEST_MODE: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Frontend Dependencies
        working-directory: ./web
        run: npm install --prefer-offline

      - name: Install Playwright Browsers
        working-directory: ./web
        run: npx playwright install --with-deps chromium

      - name: Install Solana CLI
        run: |
          set -ex
          curl -sSfL "https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/solana-release-x86_64-unknown-linux-gnu.tar.bz2" | tar -xj -C ~ --strip-components=1
          echo "$HOME/bin" >> $GITHUB_PATH
      - name: Verify Solana CLI
        run: |
          set -ex
          which solana
          solana -V

      - name: Build Solana Program
        working-directory: ./sc-solana
        run: anchor build

      - name: Start Solana Test Validator
        run: |
          cd sc-solana
          solana-test-validator \
            --bpf-program 7bGrgLgTDyQY4SMmHpQpdT2VDur8iVCRGBBjSMrcCvrb target/deploy/sc_solana.so \
            > /tmp/validator.log 2>&1 &
          echo "Waiting for validator to start..."
          for i in {1..30}; do
            if solana balance -u local >/dev/null 2>&1; then
              echo "Validator is ready!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          solana balance -u local
          cat /tmp/validator.log | tail -20

      - name: Run Integration E2E Tests
        working-directory: ./web
        run: npx playwright test --reporter=html --project=chromium e2e/integration/
        timeout-minutes: 15

      - name: Upload Integration Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-report
          path: web/playwright-report/
          retention-days: 30

      - name: Upload Validator Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validator-logs
          path: /tmp/validator.log
          retention-days: 7

  # ============================================================================
  # Job 9: Summary (runs after all tests)
  # ============================================================================
  summary:
    runs-on: ubuntu-latest
    needs: [rust-lint, build-program, test-mollusk, type-check, frontend-lint, test-unit, build-frontend, test-e2e, test-integration]
    if: always()
    steps:
      - name: Check All Jobs Status
        run: |
          echo "=== CI Summary ==="
          echo "Rust Lint: ${{ needs.rust-lint.result }}"
          echo "Build Program: ${{ needs.build-program.result }}"
          echo "Type Check: ${{ needs.type-check.result }}"
          echo "Frontend Lint: ${{ needs.frontend-lint.result }}"
          echo "Unit Tests: ${{ needs.test-unit.result }}"
          echo "Build Frontend: ${{ needs.build-frontend.result }}"
          echo "Mollusk Tests: ${{ needs.test-mollusk.result }}"
          echo "E2E Tests: ${{ needs.test-e2e.result }}"
          echo "Integration Tests: ${{ needs.test-integration.result }}"
          
          # Count failures
          FAILED=0
          
          if [ "${{ needs.rust-lint.result }}" = "failure" ]; then FAILED=$((FAILED + 1)); fi
          if [ "${{ needs.build-program.result }}" = "failure" ]; then FAILED=$((FAILED + 1)); fi
          if [ "${{ needs.test-mollusk.result }}" = "failure" ]; then FAILED=$((FAILED + 1)); fi
          if [ "${{ needs.type-check.result }}" = "failure" ]; then FAILED=$((FAILED + 1)); fi
          if [ "${{ needs.frontend-lint.result }}" = "failure" ]; then FAILED=$((FAILED + 1)); fi
          if [ "${{ needs.test-unit.result }}" = "failure" ]; then FAILED=$((FAILED + 1)); fi
          if [ "${{ needs.build-frontend.result }}" = "failure" ]; then FAILED=$((FAILED + 1)); fi
          if [ "${{ needs.test-e2e.result }}" = "failure" ]; then FAILED=$((FAILED + 1)); fi
          if [ "${{ needs.test-integration.result }}" = "failure" ]; then FAILED=$((FAILED + 1)); fi
          
          echo ""
          echo "Critical jobs failed: $FAILED"
          
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED critical job(s) failed"
            exit 1
          else
            echo "All critical jobs passed!"
          fi
