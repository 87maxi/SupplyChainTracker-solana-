name: CI

# Concurrency: cancel stale runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_TERM_COLOR: always
  SOLANA_VERSION: 2.1.18
  ANCHOR_VERSION: 0.32.1
  NODE_VERSION: 20
  # Real program ID - matches declare_id!() in lib.rs and Anchor.toml
  NEXT_PUBLIC_PROGRAM_ID: "7bGrgLgTDyQY4SMmHpQpdT2VDur8iVCRGBBjSMrcCvrb"
  NEXT_PUBLIC_RPC_URL: "https://api.devnet.solana.com"
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  # ============================================================================
  # Job 1: Rust Formatting & Clippy
  # ============================================================================
  rust-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        # Reads rust-toolchain.toml automatically for version pinning

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: cargo-registry-${{ hashFiles('sc-solana/Cargo.lock') }}

      - name: Cache Cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/index
          key: cargo-index

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: sc-solana/target
          key: cargo-target-${{ hashFiles('sc-solana/Cargo.lock') }}

      - name: Rust Format Check
        run: cd sc-solana && cargo fmt --check

      - name: Rust Clippy (Warnings as Errors)
        run: cd sc-solana && cargo clippy -- -D warnings

  # ============================================================================
  # Job 2: Build Solana Program (cargo check only)
  # ============================================================================
  build-program:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        # Reads rust-toolchain.toml automatically for version pinning

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: cargo-registry-${{ hashFiles('sc-solana/Cargo.lock') }}

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: sc-solana/target
          key: cargo-target-${{ hashFiles('sc-solana/Cargo.lock') }}

      - name: Build Program (cargo check)
        run: cd sc-solana && cargo check --all-targets

  # ============================================================================
  # Job 2b: Mollusk Tests (In-process SVM testing - no validator needed)
  # ============================================================================
  test-mollusk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        # Reads rust-toolchain.toml automatically for version pinning

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: cargo-registry-${{ hashFiles('sc-solana/Cargo.lock') }}

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: sc-solana/target
          key: cargo-target-${{ hashFiles('sc-solana/Cargo.lock') }}

      - name: Run Mollusk Tests (no .so file required)
        run: cd sc-solana/programs/sc-solana && cargo test --test mollusk-tests

  # ============================================================================
  # Job 3: TypeScript Type Checking
  # ============================================================================
  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./web
        run: npm install --prefer-offline --no-audit --no-fund

      - name: TypeScript Type Check (web)
        working-directory: ./web
        run: npx tsc --noEmit

  # ============================================================================
  # Job 4: Frontend Linting
  # ============================================================================
  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./web
        run: npm install --prefer-offline --no-audit --no-fund

      - name: ESLint Check
        working-directory: ./web
        run: npx eslint src/

  # ============================================================================
  # Job 5: Unit Tests (Jest)
  # ============================================================================
  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./web
        run: npm install --prefer-offline --no-audit --no-fund

      - name: Run Jest Unit Tests
        working-directory: ./web
        run: npm test -- --forceExit --detectOpenHandles

  # ============================================================================
  # Job 6: Build Frontend
  # ============================================================================
  build-frontend:
    runs-on: ubuntu-latest
    needs: [type-check, frontend-lint, test-unit]
    env:
      NEXT_PUBLIC_DISABLE_PRERENDER: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./web
        run: npm install --prefer-offline --no-audit --no-fund

      - name: Build Next.js Frontend
        working-directory: ./web
        env:
          NODE_ENV: production
          NEXT_PUBLIC_CLUSTER: devnet
        run: npm run build

  # ============================================================================
  # Job 7: Runbook-Based Program Tests + E2E UI Tests
  #
  # ARCHITECTURE: Two-tier testing strategy
  # - Runbook tests: Mollusk in-process SVM + syntax validation (smart contract)
  # - E2E tests: Playwright with MockWalletAdapter (UI verification)
  #
  # WHY NO VALIDATOR NEEDED:
  # - E2E tests use MockWalletAdapter (web/src/lib/solana/mock-wallet-adapter.ts)
  # - All wallet operations are mocked in-memory
  # - Next.js builds fine without RPC connectivity
  # - Mollusk tests run in-process without external dependencies
  #
  # SOLANA 2.x TOOLCHAIN ISSUE (Resolved):
  # - Original error: "failed to parse manifest at toml_datetime-1.1.1+spec-1.1.0/Cargo.toml"
  # - Root cause: Solana 2.1.18's cargo build-sbf uses embedded Cargo 1.79.0
  # - Cargo 1.79.0 cannot parse edition="2024" or spec-1.1.0 version format
  # - Solution: Split tests into UI E2E (no validator) + Mollusk (in-process SVM)
  #
  # INTEGRATION TESTS STATUS:
  # - Disabled in test-integration job (see commented section below)
  # - Requires anchor build which pulls toml_parser with edition2024
  # - Re-enable once Anchor/Solana toolchain compatibility is resolved
  # ============================================================================
  test-runbooks:
    runs-on: ubuntu-latest
    needs: [build-program, test-mollusk]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: cargo-registry-${{ hashFiles('sc-solana/Cargo.lock') }}

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: sc-solana/target
          key: cargo-target-${{ hashFiles('sc-solana/Cargo.lock') }}

      - name: Install txtx (runbook runner)
        run: |
          cargo install txtx-cli --locked 2>&1 || echo "txtx installation failed, will skip runbook validation"

      - name: Run Runbook Syntax Validation
        run: |
          cd sc-solana/runbooks
          find . -name "*.tx" -type f | while read -r runbook; do
            echo "Validating: $runbook"
            if command -v txtx &> /dev/null; then
              txtx validate "$runbook" 2>&1 || echo "WARNING: $runbook validation failed (may require environment)"
            else
              echo "SKIPPED: txtx not installed"
            fi
          done

      - name: Run Mollusk Lifecycle Tests
        working-directory: ./sc-solana/programs/sc-solana
        run: cargo test --test mollusk-lifecycle --quiet

      - name: Run Mollusk Unit Tests
        working-directory: ./sc-solana/programs/sc-solana
        run: cargo test --test mollusk-tests --quiet

      - name: Run Compute Unit Tests
        working-directory: ./sc-solana/programs/sc-solana
        run: cargo test --test compute-units --quiet

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runbook-test-report
          path: sc-solana/programs/sc-solana/target/debug/deps/*
          retention-days: 7
          if-no-files-found: ignore

  # ============================================================================
  # Job 7b: Playwright E2E Tests (UI-only, no blockchain)
  #
  # These are UI-only tests with mocked wallet connections.
  # They test page navigation, form validation, and responsive design.
  # They do NOT interact with the blockchain directly.
  # ============================================================================
  test-e2e:
    runs-on: ubuntu-latest
    needs: [build-frontend]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./web
        run: npm install --prefer-offline --no-audit --no-fund

      - name: Install Playwright Browsers
        working-directory: ./web
        run: npx playwright install --with-deps chromium

      - name: Build Next.js for E2E (production server required)
        working-directory: ./web
        env:
          NODE_ENV: production
          NEXT_PUBLIC_RPC_URL: "http://localhost:8899"
          NEXT_PUBLIC_CLUSTER: "localnet"
          NEXT_PUBLIC_NETWORK: "localnet"
          NEXT_PUBLIC_TEST_MODE: "true"
        run: npm run build

      # Playwright webServer config handles server lifecycle automatically.
      # In CI: uses 'npm start' (production server, requires build)
      # Locally: uses 'npm run dev' (development server with hot-reload)
      # No manual server startup needed - webServer starts, waits for health-check,
      # runs tests, and shuts down the server automatically.
      - name: Run Playwright E2E Tests (Chromium only)
        working-directory: ./web
        run: npx playwright test --reporter=html --project=chromium
        timeout-minutes: 10

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 30

      - name: Upload E2E Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: web/test-results/
          retention-days: 30

  # ============================================================================
  # Job 7c: Full User Flow E2E Test (Continuous Video Session)
  #
  # ARCHITECTURE NOTE: This is a single-transaction E2E test that simulates
  # a complete user journey through the application in one continuous browser
  # session. Unlike regular E2E tests that run in parallel, this test uses
  # Playwright's "full-flow" project configuration to maintain state across
  # multiple test files.
  #
  # WHY CONTINUOUS SESSION:
  # - Captures user journey as a single video (no cuts between tests)
  # - Maintains wallet connection state across test files
  # - Simulates real-world user behavior more accurately
  # - Useful for regression testing and visual verification
  #
  # CONFIGURATION (from playwright.config.ts):
  # - Uses 'full-flow' project with single browser context
  # - Video recording enabled for entire session
  # - FLOW_SLOW_MO=100ms for better video quality
  #
  # TEST COVERAGE:
  # - Homepage navigation
  # - Wallet connection (MockWalletAdapter)
  # - Netbook registration
  # - Dashboard interaction
  # - Role management
  # ============================================================================
  test-e2e-full-flow:
    runs-on: ubuntu-latest
    needs: [type-check, frontend-lint, test-unit]
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_PROGRAM_ID: "7bGrgLgTDyQY4SMmHpQpdT2VDur8iVCRGBBjSMrcCvrb"
      NEXT_PUBLIC_RPC_URL: "http://localhost:8899"
      NEXT_PUBLIC_CLUSTER: "localnet"
      NEXT_PUBLIC_NETWORK: "localnet"
      NEXT_PUBLIC_TEST_MODE: "true"
      FLOW_SLOW_MO: "100"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./web
        run: npm install --prefer-offline --no-audit --no-fund

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ hashFiles('web/package-lock.json') }}

      - name: Install Playwright Browsers
        working-directory: ./web
        run: npx playwright install --with-deps chromium

      - name: Build Next.js for Full Flow E2E
        working-directory: ./web
        env:
          NODE_ENV: production
          NEXT_PUBLIC_RPC_URL: "http://localhost:8899"
          NEXT_PUBLIC_CLUSTER: "localnet"
          NEXT_PUBLIC_NETWORK: "localnet"
          NEXT_PUBLIC_TEST_MODE: "true"
        run: npm run build

      - name: Run Full Flow E2E Test
        working-directory: ./web
        run: npx playwright test --reporter=html --project=full-flow-sequential
        timeout-minutes: 10

      - name: Upload Full Flow Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-flow-report
          path: web/playwright-report/
          retention-days: 30

  # ============================================================================
  # Job 8: Integration E2E Tests (Real Solana Test Validator)
  # DISABLED: anchor build pulls toml_parser requiring edition2024,
  # but BPF toolchain Cargo 1.79.0 cannot parse edition2024 manifests.
