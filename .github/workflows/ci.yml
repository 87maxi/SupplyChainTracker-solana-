  # ============================================================================
  # Job 9: Compute Unit Report (analyzes program compute efficiency)
  #
  # ARCHITECTURE NOTE: This job runs the compute unit measurement tests
  # that analyze the Solana program's resource consumption for each instruction.
  # These tests use the Mollusk framework to run in-process SVM execution,
  # measuring exact CU (Compute Unit) costs without needing a validator.
  #
  # TEST FILE: sc-solana/programs/sc-solana/tests/compute-units.rs
  # - Measures CU for all program instructions (register, assign, audit, etc.)
  # - Includes batch operation estimates
  # - Calculates full lifecycle costs
  # - Generates docs/compute-units-report.md as artifact
  #
  # DEPENDENCY CHAIN:
  # test-mollusk → compute-report
  # (Must validate program logic before measuring efficiency)
  #
  # OUTPUT:
  # - Uploads docs/compute-units-report.md as CI artifact
  # - Report includes CU estimates, risk assessment, recommendations
  # - Already exists with comprehensive data (101 lines)
  #
  # RE-ENABLED STATUS:
  # - Uses cargo test (not anchor test) - no toolchain issues
  # - Runs with --nocapture to output CU measurements to console
  # ============================================================================
  compute-report:
    runs-on: ubuntu-latest
    needs: [test-mollusk]
    if: always() && needs.test-mollusk.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: cargo-registry-${{ hashFiles('sc-solana/Cargo.lock') }}

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: sc-solana/target
          key: cargo-target-${{ hashFiles('sc-solana/Cargo.lock') }}

      - name: Run Compute Unit Measurement Tests
        run: cd sc-solana/programs/sc-solana && cargo test --test compute-units -- --nocapture

      - name: Upload Compute Unit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compute-unit-report
          path: docs/compute-units-report.md
          retention-days: 30

  # ============================================================================
  # Job 9: Security Scanning (Automated vulnerability detection)
  #
  # ARCHITECTURE NOTE: This job performs automated security scanning of the
  # Solana program to detect common vulnerabilities including arbitrary CPI,
  # improper PDA validation, missing signer checks, and sysvar spoofing.
  #
  # SCANNERS:
  # - Arbitrary CPI detection: Checks for external program invocations
  # - PDA Validation: Verifies all PDAs use proper seeds + bump
  # - Signer Checks: Ensures each instruction validates signers
  # - String Hash: Verify cryptographic hash (sha2) usage
  # ============================================================================
  security-scan:
    runs-on: ubuntu-latest
    needs: [build-program]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: cargo-registry-${{ hashFiles('sc-solana/Cargo.lock') }}

      - name: Run Security Scanners
        run: |
          echo "=== Solana Program Security Scan ==="
          echo ""
          
          # Check for arbitrary CPI
          echo "1. Checking for arbitrary CPI..."
          if grep -r "CpiContext\|invoke\|invoke_signed" sc-solana/programs/sc-solana/src/ --include="*.rs" | grep -v "mod.rs"; then
            echo "WARNING: Potential CPI calls found - manual review recommended"
          else
            echo "✅ No arbitrary CPI detected"
          fi
          
          # Check PDA validation
          echo ""
          echo "2. Checking PDA validation..."
          if grep -r "seeds = \[" sc-solana/programs/sc-solana/src/ --include="*.rs" | grep -v "mod.rs"; then
            echo "✅ PDA seeds found in account declarations"
          else
            echo "WARNING: No PDA seeds found"
          fi
          
          # Check signer validation
          echo ""
          echo "3. Checking signer validation..."
          if grep -r "Signer\|constraint.*key()" sc-solana/programs/sc-solana/src/ --include="*.rs" | grep -v "mod.rs"; then
            echo "✅ Signer checks found"
          else
            echo "WARNING: No signer checks found"
          fi
          
          # Check for cryptographic hash usage
          echo ""
          echo "4. Checking cryptographic hash usage..."
          if grep -r "sha2\|Sha256" sc-solana/programs/sc-solana/src/ --include="*.rs"; then
            echo "✅ Cryptographic hash (sha2) usage detected"
          else
            echo "WARNING: No cryptographic hash usage found"
          fi
          
          # Check for overflow protection
          echo ""
          echo "5. Checking overflow protection..."
          if grep -r "checked_add\|checked_sub\|checked_mul" sc-solana/programs/sc-solana/src/ --include="*.rs"; then
            echo "✅ Overflow protection found"
          else
            echo "WARNING: No overflow protection found"
          fi
          
          echo ""
          echo "=== Security Scan Complete ==="

      - name: Upload Security Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-report
          path: docs/security-scan-report.md
          retention-days: 30

  # ============================================================================
  # Job 10: Summary (runs after all tests)
  #
  # ARCHITECTURE NOTE: This job provides a final status summary of all CI jobs.
  # It runs regardless of individual job outcomes (if: always()) to ensure
  # the CI pipeline always produces a clear pass/fail result.
  #
  # JOB DEPENDENCY GRAPH:
  #
  # Phase 1 - Code Quality:
  #   rust-lint → build-frontend → test-e2e → summary
  #   type-check ──────────────────────────────────┘
  #   frontend-lint ───────────────────────────────┘
  #   test-unit ───────────────────────────────────┘
  #
  # Phase 2 - Program Validation:
  #   build-program ──┐
  #   test-mollusk ───┼── compute-report ──┐
  #                   │                    │
  #                   └────────────────────┼── summary
  #
  # Phase 3 - E2E Testing:
  #   test-e2e ────────────────────────────┘
  #   test-e2e-full-flow ──────────────────┘
  #
  # Phase 4 - Security:
  #   security-scan ───────────────────────┘
  #
  # WHY 12 DEPENDENCIES:
  # - All 12 critical jobs must pass for CI to succeed
  # - Integration tests are DISABLED (see Job 8 comment)
  # - Failure count logic tracks all 12 jobs
  #
  # FAILURE HANDLING:
  # - Uses GitHub Actions error annotation (::error::)
  # - Exits with code 1 to mark workflow as failed
  # - Summary output visible in workflow logs
  # ============================================================================
  summary:
    runs-on: ubuntu-latest
    needs: [rust-lint, build-program, test-mollusk, compute-report, type-check, frontend-lint, test-unit, build-frontend, test-runbooks, test-e2e, test-e2e-full-flow, security-scan]
    if: always()
    steps:
      - name: Check All Jobs Status
        run: |
          echo "=== CI Summary ==="
          echo "Rust Lint: ${{ needs.rust-lint.result }}"
          echo "Build Program: ${{ needs.build-program.result }}"
          echo "Type Check: ${{ needs.type-check.result }}"
          echo "Frontend Lint: ${{ needs.frontend-lint.result }}"
          echo "Unit Tests: ${{ needs.test-unit.result }}"
          echo "Build Frontend: ${{ needs.build-frontend.result }}"
          echo "Mollusk Tests: ${{ needs.test-mollusk.result }}"
          echo "Compute Report: ${{ needs.compute-report.result }}"
          echo "Runbook Tests: ${{ needs.test-runbooks.result }}"
          echo "E2E Tests: ${{ needs.test-e2e.result }}"
          echo "E2E Full Flow: ${{ needs.test-e2e-full-flow.result }}"
          echo "Security Scan: ${{ needs.security-scan.result }}"
          echo ""
          echo "Integration Tests: DISABLED (anchor build toolchain incompatibility)"
          
          # Count failures
          FAILED=0
          
          if [ "${{ needs.rust-lint.result }}" = "failure" ]; then FAILED=$((FAILED + 1)); fi
          if [ "${{ needs.build-program.result }}" = "failure" ]; then FAILED=$((FAILED + 1)); fi
          if [ "${{ needs.test-mollusk.result }}" = "failure" ]; then FAILED=$((FAILED + 1)); fi
          if [ "${{ needs.compute-report.result }}" = "failure" ]; then FAILED=$((FAILED + 1)); fi
          if [ "${{ needs.type-check.result }}" = "failure" ]; then FAILED=$((FAILED + 1)); fi
          if [ "${{ needs.frontend-lint.result }}" = "failure" ]; then FAILED=$((FAILED + 1)); fi
          if [ "${{ needs.test-unit.result }}" = "failure" ]; then FAILED=$((FAILED + 1)); fi
          if [ "${{ needs.build-frontend.result }}" = "failure" ]; then FAILED=$((FAILED + 1)); fi
          if [ "${{ needs.test-runbooks.result }}" = "failure" ]; then FAILED=$((FAILED + 1)); fi
          if [ "${{ needs.test-e2e.result }}" = "failure" ]; then FAILED=$((FAILED + 1)); fi
          if [ "${{ needs.test-e2e-full-flow.result }}" = "failure" ]; then FAILED=$((FAILED + 1)); fi
          if [ "${{ needs.security-scan.result }}" = "failure" ]; then FAILED=$((FAILED + 1)); fi
          
          echo ""
          echo "Critical jobs failed: $FAILED"
          
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED critical job(s) failed"
            exit 1
          else
            echo "All critical jobs passed!"
          fi
