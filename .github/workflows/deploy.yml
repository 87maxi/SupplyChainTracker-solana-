name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'devnet'
        type: choice
        options:
          - devnet
          - mainnet-beta

env:
  SOLANA_VERSION: 2.1.18
  ANCHOR_VERSION: 0.32.1
  NODE_VERSION: 20
  NEXT_PUBLIC_PROGRAM_ID: "7bGrgLgTDyQY4SMmHpQpdT2VDur8iVCRGBBjSMrcCvrb"
  NEXT_PUBLIC_RPC_URL_DEVNET: "https://api.devnet.solana.com"
  NEXT_PUBLIC_RPC_URL_MAINNET: "https://api.mainnet-beta.solana.com"

jobs:
  # ============================================================================
  # Job 1: Build and Test
  # ============================================================================
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        # Reads rust-toolchain.toml automatically for version pinning

      - name: Install Frontend Dependencies
        run: cd web && npm install --prefer-offline

      - name: TypeScript Type Check (web)
        run: cd web && npx tsc --noEmit

      - name: Run Jest Unit Tests
        run: cd web && npm test -- --forceExit --detectOpenHandles

      # NOTE: Solana program building requires Anchor toolchain which has
      # compatibility issues with the CI environment (BPF toolchain Cargo 1.79.0
      # cannot parse edition2024 manifests). Program must be built and deployed
      # locally using: cd sc-solana && anchor deploy
      - name: Check Solana Program (cargo check)
        run: cd sc-solana && cargo check --all-targets

  # ============================================================================
  # Job 2: Deploy Frontend
  # ============================================================================
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build-and-test
    outputs:
      frontend-url: ${{ steps.set-frontend-url.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Frontend Dependencies
        run: cd web && npm install --prefer-offline

      - name: Build Next.js Frontend
        run: cd web && npm run build
        env:
          NEXT_PUBLIC_PROGRAM_ID: ${{ env.NEXT_PUBLIC_PROGRAM_ID }}
          NEXT_PUBLIC_RPC_URL: ${{ env.NEXT_PUBLIC_RPC_URL_DEVNET }}
          NEXT_PUBLIC_CLUSTER: "devnet"

      - name: Set Frontend URL
        id: set-frontend-url
        run: |
          if [ "${{ github.event.inputs.environment || 'devnet' }}" = "mainnet-beta" ]; then
            echo "url=https://supplychaintracker.com" >> $GITHUB_OUTPUT
          else
            echo "url=https://supplychaintracker-devnet.vercel.app" >> $GITHUB_OUTPUT
          fi

  # ============================================================================
  # Job 3: Deploy Solana Program
  # NOTE: Program deployment requires Anchor CLI and local build (.so files).
  # Due to BPF toolchain incompatibility with CI (Cargo 1.79.0 cannot parse
  # edition2024), the program must be built and deployed locally:
  #   cd sc-solana && anchor deploy --provider.url https://api.devnet.solana.com
  # This job now serves as a documentation placeholder for the deployment process.
  # ============================================================================
  deploy-program:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Program Deployment Requires Local Anchor CLI
        run: |
          echo "=== Solana Program Deployment ==="
          echo "The Solana program must be built and deployed locally using Anchor CLI."
          echo ""
          echo "Steps to deploy:"
          echo "  1. Install Anchor CLI: cargo install --git https://github.com/coral-xyz/anchor avm --locked"
          echo "  2. Build program: cd sc-solana && anchor build"
          echo "  3. Deploy to devnet: anchor deploy --provider.url https://api.devnet.solana.com"
          echo "  4. Deploy to mainnet: anchor deploy --provider.url https://api.mainnet-beta.solana.com"
          echo ""
          echo "CI only runs 'cargo check --all-targets' for validation."

  # ============================================================================
  # Job 4: Deploy to Vercel (Frontend)
  # ============================================================================
  deploy-vercel:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment Information
        run: |
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ]; then
            vercel pull --yes --environment=${{ github.event.inputs.environment == 'mainnet-beta' && 'production' || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }}
          else
            echo "VERCEL_TOKEN not configured, skipping vercel pull"
          fi

      - name: Build Project Artifacts
        run: |
          cd web
          npm install
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ]; then
            vercel build --token=${{ secrets.VERCEL_TOKEN }}
          else
            npm run build
          fi
        env:
          NEXT_PUBLIC_PROGRAM_ID: ${{ env.NEXT_PUBLIC_PROGRAM_ID }}
          NEXT_PUBLIC_RPC_URL: ${{ github.event.inputs.environment == 'mainnet-beta' && env.NEXT_PUBLIC_RPC_URL_MAINNET || env.NEXT_PUBLIC_RPC_URL_DEVNET }}
          NEXT_PUBLIC_CLUSTER: ${{ github.event.inputs.environment == 'mainnet-beta' && 'mainnet-beta' || 'devnet' }}

      - name: Deploy Project Artifacts to Vercel
        run: |
          cd web
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ]; then
            vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
          else
            echo "VERCEL_TOKEN not configured, skipping vercel deploy"
            echo "Build output available in web/.next/"
          fi
        env:
          NEXT_PUBLIC_PROGRAM_ID: ${{ env.NEXT_PUBLIC_PROGRAM_ID }}
          NEXT_PUBLIC_RPC_URL: ${{ github.event.inputs.environment == 'mainnet-beta' && env.NEXT_PUBLIC_RPC_URL_MAINNET || env.NEXT_PUBLIC_RPC_URL_DEVNET }}
          NEXT_PUBLIC_CLUSTER: ${{ github.event.inputs.environment == 'mainnet-beta' && 'mainnet-beta' || 'devnet' }}
