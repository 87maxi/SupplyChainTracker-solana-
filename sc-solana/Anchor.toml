[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.localnet]
sc_solana = "CMirNs1A8FfyWcb1TsbUHtxNzAfAUmwaUPmp8VCz2hS"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 \"tests/**/*.ts\""

[test]
startup_wait = 10000
shutdown_wait = 2000
upgradeable = false

[test.validator]
slots_per_epoch = "64"
keep_empty_slot_epoch_hashes = true

# Fix for Solana 3.1.x: Remove --bind-address 0.0.0.0 which causes panic
# Use [test.validator.rpc_bind_address] instead if needed
